<body>

}

setTimeout(function(){

coins += 5
updateCoins()

alert("+5 Coins Added")

},6000)

}

function promote(){

let link = document.getElementById("link").value

if(coins < 10){

alert("Minimum 10 coins required")

return

}

coins -= 10

alert("Promotion submitted")

updateCoins()

}

</script>
